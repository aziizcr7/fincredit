<div class="page-header">
  <div>
    <div class="page-title"><span>Notifications</span></div>
    <div class="page-sub">Vos alertes et messages bancaires</div>
  </div>
  <button class="btn btn-ghost" (click)="markAllRead()">✅ Tout marquer comme lu</button>
</div>

<div *ngIf="loading" class="loading-wrap"><div class="spinner-lg"></div></div>

<div class="card" *ngIf="!loading">
  <div *ngIf="notifications.length === 0" style="text-align:center;padding:40px;color:var(--silver)">
    <div style="font-size:40px;margin-bottom:12px">🔔</div>
    Aucune notification pour le moment
  </div>
  <div class="notif-row" *ngFor="let n of notifications" [class.unread]="!n.is_read">
    <div class="notif-icon-lg" [ngClass]="'type-'+n.type">
      {{ n.type === 'success' ? '✅' : n.type === 'warning' ? '⚠️' : n.type === 'danger' ? '❌' : 'ℹ️' }}
    </div>
    <div class="notif-content">
      <div class="notif-title">{{ n.title }}</div>
      <div class="notif-msg">{{ n.message }}</div>
      <div class="notif-time">{{ n.created_at | date:'dd/MM/yyyy à HH:mm' }}</div>
    </div>
    <div class="unread-dot" *ngIf="!n.is_read"></div>
  </div>
</div>
